<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Blocky beveled frame (echoes the in-game RetroPanel) -->
  <rect width="1024" height="1024" fill="#000000"/>
  <rect x="16" y="16" width="992" height="992" fill="#D99A2B"/>
  <rect x="16" y="16" width="992" height="14" fill="#F0C04A"/>
  <rect x="16" y="16" width="14" height="992" fill="#F0C04A"/>
  <rect x="16" y="994" width="992" height="14" fill="#A06813"/>
  <rect x="994" y="16" width="14" height="992" fill="#A06813"/>
  <rect x="70" y="70" width="884" height="884" fill="#000000"/>
  <rect x="84" y="84" width="856" height="856" fill="#15120B"/>

  <!-- Shield -->
  <path d="M332,360 L692,360 L692,560 C692,690 600,760 512,800 C424,760 332,690 332,560 Z"
        fill="#E0A92E" stroke="#000000" stroke-width="16" stroke-linejoin="round"/>
  <path d="M360,388 L664,388 L664,558 C664,664 588,726 512,760 C436,726 360,664 360,558 Z"
        fill="none" stroke="#F4CF6A" stroke-width="8" stroke-linejoin="round"/>

  <!-- Sword (over the shield) -->
