           fill="#D7D9E0" stroke="#000000" stroke-width="10" stroke-linejoin="round"/>
  <rect x="508" y="312" width="8" height="280" fill="#A9AEBC"/>
  <rect x="398" y="586" width="228" height="30" rx="4" fill="#D99A2B" stroke="#000000" stroke-width="10"/>
  <rect x="498" y="614" width="28" height="80" fill="#5A3A1A" stroke="#000000" stroke-width="8"/>
  <circle cx="512" cy="708" r="28" fill="#D99A2B" stroke="#000000" stroke-width="10"/>
</svg>
